openapi: 3.1.0
info:
  title: Weave Cognitive Runtime API
  version: 0.1.0
  summary: REST + SSE + MCP for organizational memory, emergent skills, and agents.
  description: |
    Weave ingests team activity (Slack, Notion, manual messages), extracts atomic facts,
    detects recurring patterns, and **emerges reusable skills and specialist agents**
    without anyone writing runbooks by hand.

    - **Realtime:** `GET /events` streams pipeline notifications (SSE).
    - **Memory:** facts, skills, knowledge graph, scoped Q&A with provenance.
    - **Governance:** emergent agents start `pending` until approved.
    - **Integrations:** OAuth Slack/Notion, MCP tool `ask_memory` for external agents.

    Default project (tenant) is `pennylane` when `project` is omitted.
  contact:
    name: Weave
  license:
    name: MIT
    identifier: MIT

servers:
  - url: http://127.0.0.1:8787
    description: Local development
  - url: https://strayeye.com/weave-api
    description: Production (via Next.js proxy)

tags:
  - name: Health
    description: Liveness and LLM provider info
  - name: Realtime
    description: Server-Sent Events live feed
  - name: Ingestion
    description: Inject or pull activity into the pipeline
  - name: Memory
    description: Facts, skills, graph, stats, Q&A
  - name: Agents
    description: Emergent specialists — approve and run
  - name: Organization
    description: Org presets, config, sandbox reset
  - name: Connections
    description: OAuth connection status and disconnect
  - name: OAuth
    description: Slack and Notion authorization flows
  - name: MCP
    description: JSON-RPC 2.0 Model Context Protocol endpoint

security:
  - bearerAuth: []
  - apiKeyAuth: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      operationId: getHealth
      responses:
        "200":
          description: API is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                service: weave
                llm: groq

  /openapi.yaml:
    get:
      tags: [Health]
      summary: OpenAPI 3.1 specification
      description: Machine-readable API contract (same file as `docs/api/openapi.yaml` in the repo).
      security: []
      operationId: getOpenApiSpec
      responses:
        "200":
          description: YAML OpenAPI document
          content:
            application/yaml:
              schema:
                type: string

  /events:
    get:
      tags: [Realtime]
      summary: Live pipeline feed (SSE)
      description: |
        Streams `PipelineEvent` objects as `text/event-stream`.
        Event types include `event_ingested`, `fact_extracted`, `pattern_observed`,
        `skill_emerged`, `agent_emerged`, `simulation_complete`.
      security: []
      operationId: sseEvents
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/PipelineEvent"

  /stats:
    get:
      tags: [Memory]
      summary: Project counters
      operationId: getStats
      parameters:
        - $ref: "#/components/parameters/projectQuery"
      responses:
        "200":
          description: Aggregated counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"

  /facts:
    get:
      tags: [Memory]
      summary: Recent facts
      operationId: getFacts
      parameters:
        - $ref: "#/components/parameters/projectQuery"
      responses:
        "200":
          description: Up to 100 recent facts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fact"

  /skills:
    get:
      tags: [Memory]
      summary: Emerged skills
      operationId: getSkills
      parameters:
        - $ref: "#/components/parameters/projectQuery"
      responses:
        "200":
          description: All skills for the project
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Skill"

  /graph:
    get:
      tags: [Memory]
      summary: Knowledge graph
      operationId: getGraph
      parameters:
        - $ref: "#/components/parameters/projectQuery"
      responses:
        "200":
          description: Entities and relationships
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphResponse"

  /ask:
    post:
      tags: [Memory]
      summary: Query organizational memory
      description: Hybrid retrieval across memory layers; returns answer with provenance.
      operationId: askMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskRequest"
            example:
              project: pennylane
              question: Comment relancer la synchro bancaire ?
      responses:
        "200":
          description: Answer with layers and optional skill used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerResult"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /simulate:
    post:
      tags: [Ingestion]
      summary: Simulate org activity stream
      description: |
        Generates ~66 deterministic Slack/Notion-like events for the org config and
        ingests them in the background (~80 ms between events). Emits `simulation_complete` on SSE when done.
      operationId: simulate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectBody"
      responses:
        "200":
          description: Simulation started
          content:
            application/json:
              schema:
                type: object
                required: [status, events]
                properties:
                  status:
                    type: string
                    enum: [simulating]
                  events:
                    type: integer
                    description: Batch size (events generated)
              example:
                status: simulating
                events: 66
        "401":
          $ref: "#/components/responses/Unauthorized"

  /replay:
    post:
      tags: [Ingestion]
      summary: Replay seed dataset
      operationId: replay
      parameters:
        - $ref: "#/components/parameters/projectQuery"
      responses:
        "200":
          description: Replay started in background
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [replaying]
                  project:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /inject:
    post:
      tags: [Ingestion]
      summary: Inject a manual message
      operationId: inject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InjectRequest"
      responses:
        "200":
          description: Event ingested synchronously
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [injected]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ingest/slack:
    post:
      tags: [Ingestion]
      summary: Ingest Slack channels
      description: |
        Uses OAuth user token (preferred) or `SLACK_BOT_TOKEN`. Discovers the connected
        user's public channels unless `SLACK_CHANNEL` is set.
      operationId: ingestSlack
      parameters:
        - $ref: "#/components/parameters/projectQuery"
      responses:
        "200":
          description: Ingestion started or not configured
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/IngestStarted"
                  - $ref: "#/components/schemas/NotConfigured"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ingest/notion:
    post:
      tags: [Ingestion]
      summary: Ingest Notion workspace
      description: Live poll when connected; otherwise replays Notion-tagged seed events.
      operationId: ingestNotion
      parameters:
        - $ref: "#/components/parameters/projectQuery"
      responses:
        "200":
          description: Ingestion started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestStarted"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /reset:
    post:
      tags: [Organization]
      summary: Wipe project data
      operationId: resetProject
      parameters:
        - $ref: "#/components/parameters/projectQuery"
      responses:
        "200":
          description: Project reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [reset]
                  project:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /org:
    get:
      tags: [Organization]
      summary: Get org configuration
      operationId: getOrg
      parameters:
        - $ref: "#/components/parameters/projectQuery"
      responses:
        "200":
          description: Stored config or preset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgConfig"
    put:
      tags: [Organization]
      summary: Save org configuration
      operationId: putOrg
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrgConfig"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [saved]
                  org:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /org/presets:
    get:
      tags: [Organization]
      summary: List sandbox presets
      security: []
      operationId: getPresets
      responses:
        "200":
          description: PennyLane, Acme, …
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrgConfig"

  /org/load:
    post:
      tags: [Organization]
      summary: Load a preset as active org
      description: Saves config, wipes data, seeds predefined agents.
      operationId: loadOrg
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org]
              properties:
                org:
                  type: string
                  example: pennylane
      responses:
        "200":
          description: Loaded org config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /agents:
    get:
      tags: [Agents]
      summary: List agents
      operationId: getAgents
      parameters:
        - $ref: "#/components/parameters/projectQuery"
      responses:
        "200":
          description: Predefined and emergent agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

  /agents/approve:
    post:
      tags: [Agents]
      summary: Approve a pending agent
      description: Sets status to `active` and best-effort write-back to Notion.
      operationId: approveAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                project:
                  type: string
                name:
                  type: string
      responses:
        "200":
          description: Agent activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [active]
                  name:
                    type: string
                  project:
                    type: string
                  notion:
                    type: string
                    enum: [written, failed, not_connected]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /agents/run:
    post:
      tags: [Agents]
      summary: Run an agent task
      description: Plan → delegate → verify orchestration with trace.
      operationId: runAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunAgentRequest"
      responses:
        "200":
          description: Agent run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRun"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /connections:
    get:
      tags: [Connections]
      summary: List OAuth connections
      security: []
      operationId: getConnections
      responses:
        "200":
          description: Non-sensitive connection metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectionInfo"

  /connections/{provider}:
    delete:
      tags: [Connections]
      summary: Disconnect a provider
      operationId: disconnectProvider
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [slack, notion]
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [disconnected]
                  provider:
                    type: string
                  removed:
                    type: integer

  /oauth/slack/authorize:
    get:
      tags: [OAuth]
      summary: Start Slack OAuth
      security: []
      operationId: oauthSlackAuthorize
      responses:
        "302":
          description: Redirect to Slack consent

  /oauth/slack/callback:
    get:
      tags: [OAuth]
      summary: Slack OAuth callback
      security: []
      operationId: oauthSlackCallback
      responses:
        "302":
          description: Redirect to web UI with success or error flash

  /oauth/notion/authorize:
    get:
      tags: [OAuth]
      summary: Start Notion OAuth
      security: []
      operationId: oauthNotionAuthorize
      responses:
        "302":
          description: Redirect to Notion consent

  /oauth/notion/callback:
    get:
      tags: [OAuth]
      summary: Notion OAuth callback
      security: []
      operationId: oauthNotionCallback
      responses:
        "302":
          description: Redirect to web UI

  /connections/slack/import:
    post:
      tags: [OAuth]
      summary: Import Slack token from environment
      description: Dev helper when `SLACK_BOT_TOKEN` is set in server env.
      operationId: importSlackFromEnv
      responses:
        "200":
          description: Imported or skipped
        "401":
          $ref: "#/components/responses/Unauthorized"

  /mcp:
    post:
      tags: [MCP]
      summary: Model Context Protocol (JSON-RPC 2.0)
      description: |
        Supports `initialize`, `tools/list`, `tools/call` (tool: `ask_memory`),
        and no-op `notifications/*`.
      operationId: mcp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JsonRpcRequest"
      responses:
        "200":
          description: JSON-RPC response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Set when `WEAVE_API_KEY` is configured on the server
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    projectQuery:
      name: project
      in: query
      description: Tenant / org slug (default `pennylane`)
      schema:
        type: string
        default: pennylane

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: weave
        llm:
          type: string
          description: Active LLM provider name
          example: groq

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    ProjectBody:
      type: object
      properties:
        project:
          type: string

    StatsResponse:
      type: object
      properties:
        events:
          type: integer
        facts:
          type: integer
        entities:
          type: integer
        relationships:
          type: integer
        skills:
          type: array
          items:
            type: string
        agents:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
                enum: [active, pending]
        llm:
          type: string

    MemoryLevel:
      type: string
      enum: [personal, team, project, organization]

    FactType:
      type: string
      enum: [decision, question, answer, fact]

    Fact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: [string, "null"]
          format: uuid
        project:
          type: string
        team:
          type: string
        workstream:
          type: string
        ftype:
          $ref: "#/components/schemas/FactType"
        author:
          type: string
        topic:
          type: string
        content:
          type: string
        confidence:
          type: number
          format: float
        memory_level:
          $ref: "#/components/schemas/MemoryLevel"
        created_at:
          type: string
          format: date-time

    Skill:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project:
          type: string
        team:
          type: string
        workstream:
          type: string
        name:
          type: string
        trigger:
          type: string
        body:
          type: string
        theme:
          type: string
        referents:
          type: array
          items:
            type: string
        memory_level:
          $ref: "#/components/schemas/MemoryLevel"
        created_at:
          type: string
          format: date-time

    Entity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project:
          type: string
        name:
          type: string
        kind:
          type: string

    Relationship:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project:
          type: string
        src:
          type: string
          format: uuid
        dst:
          type: string
          format: uuid
        rel:
          type: string

    GraphResponse:
      type: object
      properties:
        entities:
          type: array
          items:
            $ref: "#/components/schemas/Entity"
        relationships:
          type: array
          items:
            $ref: "#/components/schemas/Relationship"

    AskRequest:
      type: object
      required: [question]
      properties:
        project:
          type: string
        question:
          type: string

    FactBrief:
      type: object
      properties:
        topic:
          type: string
        content:
          type: string
        author:
          type: string
        ftype:
          type: string

    LayerContext:
      type: object
      properties:
        level:
          $ref: "#/components/schemas/MemoryLevel"
        facts:
          type: array
          items:
            $ref: "#/components/schemas/FactBrief"

    AnswerResult:
      type: object
      properties:
        answer:
          type: string
        skill_used:
          type: [string, "null"]
        layers:
          type: array
          items:
            $ref: "#/components/schemas/LayerContext"

    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project:
          type: string
        team:
          type: string
        name:
          type: string
        role:
          type: string
        domain:
          type: string
        description:
          type: string
        skills:
          type: array
          items:
            type: string
        scope:
          $ref: "#/components/schemas/MemoryLevel"
        status:
          type: string
          enum: [active, pending]
        derived_from:
          type: string
        created_at:
          type: string
          format: date-time

    TraceStep:
      type: object
      properties:
        agent:
          type: string
        action:
          type: string
        note:
          type: string
        depth:
          type: integer

    AgentRun:
      type: object
      properties:
        answer:
          type: string
        trace:
          type: array
          items:
            $ref: "#/components/schemas/TraceStep"

    RunAgentRequest:
      type: object
      required: [task]
      properties:
        project:
          type: string
        agent:
          type: string
          default: assistant
        task:
          type: string

    InjectRequest:
      type: object
      required: [text]
      properties:
        project:
          type: string
        team:
          type: string
        workstream:
          type: string
        actor:
          type: string
        text:
          type: string
        topic:
          type: string

    IngestStarted:
      type: object
      properties:
        status:
          type: string
          enum: [ingesting]
        source:
          type: string
          enum: [slack, notion]
        events:
          type: integer
        project:
          type: string

    NotConfigured:
      type: object
      properties:
        status:
          type: string
          enum: [not_configured]
        hint:
          type: string

    ConnectionInfo:
      type: object
      properties:
        provider:
          type: string
          enum: [slack, notion]
        team_id:
          type: [string, "null"]
        scopes:
          type: string
        expires_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    OrgConfig:
      type: object
      properties:
        org:
          type: string
        name:
          type: string
        teams:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              members:
                type: array
                items:
                  type: string
              projects:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    theme:
                      type: string
                    domain:
                      type: string

    PipelineEvent:
      description: Discriminated union on `type` (snake_case)
      oneOf:
        - type: object
          required: [type]
          properties:
            type:
              const: event_ingested
            id:
              type: string
              format: uuid
            source:
              type: string
            actor:
              type: string
            kind:
              type: string
            text:
              type: string
        - type: object
          required: [type]
          properties:
            type:
              const: fact_extracted
            id:
              type: string
              format: uuid
            ftype:
              type: string
            author:
              type: string
            topic:
              type: string
            content:
              type: string
            confidence:
              type: number
            memory_level:
              type: string
        - type: object
          required: [type]
          properties:
            type:
              const: pattern_observed
            signature:
              type: string
            occurrences:
              type: integer
            threshold:
              type: integer
        - type: object
          required: [type]
          properties:
            type:
              const: skill_emerged
            id:
              type: string
              format: uuid
            name:
              type: string
            trigger:
              type: string
            referents:
              type: array
              items:
                type: string
            sources_count:
              type: integer
            body:
              type: string
        - type: object
          required: [type]
          properties:
            type:
              const: agent_emerged
            name:
              type: string
            domain:
              type: string
            skills:
              type: array
              items:
                type: string
            status:
              type: string
        - type: object
          required: [type]
          properties:
            type:
              const: simulation_complete
            project:
              type: string
            batch_size:
              type: integer
            inserted:
              type: integer

    JsonRpcRequest:
      type: object
      required: [jsonrpc, method]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: string
            - type: integer
            - type: "null"
        method:
          type: string
        params:
          type: object

    JsonRpcResponse:
      type: object
      properties:
        jsonrpc:
          type: string
        id: {}
        result: {}
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
