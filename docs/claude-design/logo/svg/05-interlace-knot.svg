<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="color:#37352f">
  <!-- Interlace knot: two rings woven over-and-under. Interconnection / shared memory. -->
  <defs>
    <mask id="gapTop"><rect width="100" height="100" fill="#fff"/><circle cx="50" cy="35" r="7" fill="#000"/></mask>
    <mask id="gapBot"><rect width="100" height="100" fill="#fff"/><circle cx="50" cy="65" r="7" fill="#000"/></mask>
  </defs>
  <g fill="none" stroke="currentColor" stroke-width="4">
    <circle cx="41" cy="50" r="18" mask="url(#gapBot)"/>
    <circle cx="59" cy="50" r="18" mask="url(#gapTop)"/>
  </g>
</svg>
